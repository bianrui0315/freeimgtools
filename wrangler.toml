name = "freeimgtools"
compatibility_date = "2024-09-23"
pages_build_output_dir = "."

# Workers AI binding — enables AI features (alt text, classification)
# This is free to use on Cloudflare Pages
[ai]
binding = "AI"

# Optional: create a KV namespace named AI_RATE_LIMIT_KV for stronger shared
# rate limiting across Cloudflare isolates. Without it, the app still uses an
# in-memory per-isolate fallback.
# [[kv_namespaces]]
# binding = "AI_RATE_LIMIT_KV"
# id = "replace-with-kv-namespace-id"

# Optional: add this Cloudflare Pages environment variable to enable the sample
# AI image analysis function. Leave it unset to avoid Workers AI usage.
# AI_FEATURES_ENABLED = "true"
