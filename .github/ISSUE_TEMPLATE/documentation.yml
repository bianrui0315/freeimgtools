name: Documentation correction
description: Report outdated, unclear, or incorrect guide content.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: input
    id: page
    attributes:
      label: Page URL
      placeholder: https://freeimgtools.net/guides/image-seo
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What should be corrected?
      description: Explain what is outdated, unclear, or wrong.
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Source or reference
      description: First-party platform documentation is best when dimensions or file-size requirements changed.
      placeholder: https://...
